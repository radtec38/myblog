name: YouTube Upload Candidates

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  generate-candidates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install gray-matter
      - name: Generate upload candidates
        run: node scripts/generate-youtube-candidates.cjs > upload-candidates.json
      - name: Display candidates
        run: cat upload-candidates.json
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          commit-message: 'chore: YouTube upload candidates'
          title: '📹 YouTube Shorts Upload Candidates'
          body: |
            ## Today's Upload Candidates
            See `upload-candidates.json` for videos ready to upload.
            1. Download MP4 + SRT from `shorts-output/`
            2. Upload to YouTube Studio
            3. Set Privacy: Private (testing)
          branch: youtube-upload-${{ github.run_number }}
          delete-branch: true
